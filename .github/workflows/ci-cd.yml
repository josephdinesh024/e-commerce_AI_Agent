  #   needs: backend
  #
  #   steps:
  #     - name: Check out code
  #       uses: actions/checkout@v4
  #
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: '20'
  #         cache: 'npm'
  #     - run: npm install
  #     - run: npm run test

   # Automate Semantic Versioning and Tag Creation 
  release:
    runs-on: ubuntu-latest
    needs: backend # Only create a version if all tests pass!
    permissions:
      contents: write # CRITICAL: Allows the action to create and push a git tag
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Crucial: Fetches all git history so it can read previous tags

      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true            # Prefixes the tag with 'v' (e.g., v1.0.0)
          DEFAULT_BUMP: patch   # Default to patch if no conventional commits are found


