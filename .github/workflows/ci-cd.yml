name: CI/CD pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  
jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ecommerce_db
        ports:
          - 5432:5432
        # Ensure the database is ready before the job starts
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Use setup-python's built-in pip caching

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # - name: Run Database Migrations
      #   working-directory: ./backend
      #   env:
      #     DATABASE_URL: postgresql://postgres:password@localhost:5432/ecommerce_db
      #   run: |
      #     alembic upgrade head

      - name: Run Server & test api
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/ecommerce_db
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          API_MODE: http
          API_BASE_URL: http://localhost:8000
        run: |
          # Start uvicorn in the background using '&' so the pipeline doesn't block
          uvicorn app.main:app --port 8000 &
          
          # Wait for the FastAPI server to be fully ready
          echo "Waiting for server to start..."
          timeout 30 bash -c 'while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' localhost:8000/)" != "200" ]]; do sleep 1; done' || false
          echo "Server is up!"

          # Run the test suite
          pytest test/
  
  # frontend:
